packages:
  - example-apps/*
  - example-fragments/*
  - apps/*
  - packages/*
  - packages-private/*
  - scripts

catalog:
  "@types/react": ^19.2.14
  "@types/react-dom": ^19.2.3
  react: ^19.2.7
  react-dom: ^19.2.7
  typescript: npm:@typescript/typescript6@^6.0.2
  typescript-7: npm:typescript@^7.0.2
  vite: ^8.0.0
  vitest: ^4.1.4

overrides:
  esbuild@<=0.24.2: ">=0.25.0"
  unicorn-magic: 0.4.0
  zod@^4.0.0: 4.3.5

patchedDependencies:
  "@earendil-works/pi-ai": patches/@earendil-works__pi-ai.patch

allowBuilds:
  better-sqlite3: true
  "@mongodb-js/zstd": false
  "@parcel/watcher": false
  "@prisma/client": false
  "@prisma/engines": false
  core-js: false
  esbuild: false
  fallow: false
  "@google/genai": false
  lefthook: false
  node-liblzma: false
  prisma: false
  protobufjs: false
  sharp: false
  workerd: false
